<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IC-705 Band Decoder</title>
  <link rel="stylesheet" href="/cat.css">
  <style>
    .bd-shell {
      width: min(960px, calc(100vw - 24px));
      margin: 24px auto 40px;
    }
    .bd-card {
      background: #0d1116;
      border: 1px solid #1f2731;
      border-radius: 16px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.5);
      padding: 20px 24px;
    }
    .bd-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .bd-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .bd-btn-sec {
      padding: 5px 14px;
      border-radius: 8px;
      border: 1px solid #1f2731;
      background: #0d1116;
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    .bd-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .bd-toolbar label { font-weight: 600; color: var(--muted); font-size: 13px; white-space: nowrap; }
    .bd-toolbar select {
      width: 160px;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid #1f2731;
      background: #07090b;
      color: var(--text);
      font-size: 13px;
    }
    .bd-status { font-size: 13px; color: var(--muted); }
    .bd-wrap { overflow-x: auto; }
    table.bd-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    .bd-table th, .bd-table td {
      border: 1px solid #1f2731;
      padding: 4px 6px;
      text-align: center;
      white-space: nowrap;
      color: var(--text);
    }
    .bd-table th {
      background: #07090b;
      font-weight: 700;
      color: var(--muted);
    }
    .bd-outputs-header {
      background: #07090b !important;
      color: var(--muted) !important;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.1em;
    }
    .bd-table input[type=number] {
      width: 72px;
      border: 1px solid #1f2731;
      border-radius: 4px;
      padding: 2px 4px;
      background: #07090b;
      color: var(--text);
      text-align: right;
      font-size: 12px;
    }
    .bd-table input[type=checkbox] { accent-color: var(--blue); }
    .bd-cell-green { background: #003a00 !important; }
    .bd-cell-green input { background: transparent !important; color: #7eff66 !important; }
    .bd-cell-red { background: #3a0000 !important; }
    .bd-cell-red input { background: transparent !important; color: #ff6666 !important; }
    .bd-col-header.bd-active { background: #3a0000 !important; color: #ff6666 !important; }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="tabs" aria-label="Primary">
      <a class="tab" href="/log">QRPLog</a>
      <a class="tab" href="/dxc.html" onclick="window.open(this.href,'DXC','width=600,height=750,left=0,top=0,menubar=no,location=no,status=no'); return false;">DXC</a>
      <a class="tab" href="/">CAT</a>
      <a class="tab" href="/ws-cat">DEBUG</a>
      <a class="tab" href="/setup">SETUP</a>
      <a class="tab" href="/datasync">LOGSYNC</a>
      <a class="tab tab-active" href="/bd">BD</a>
      <span id="topbarFw" class="topbar-fw"></span>
    </nav>
  </header>

  <main class="bd-shell">
    <div class="bd-card">
      <div class="bd-header">
        <div class="bd-title">Band Decoder</div>
        <button id="bd-defaults" class="bd-btn-sec">Defaults</button>
      </div>
      <div class="bd-toolbar">
        <label for="bd-source">Freq source:</label>
        <select id="bd-source"></select>
        <span class="bd-status" id="bd-status"></span>
      </div>
      <div class="bd-wrap">
        <table class="bd-table">
          <thead>
            <tr>
              <th rowspan="2">fMin (kHz)</th>
              <th rowspan="2">fMax (kHz)</th>
              <th colspan="16" class="bd-outputs-header">OUTPUTS</th>
            </tr>
            <tr>
              <th id="bdh-0"  class="bd-col-header">1</th>
              <th id="bdh-1"  class="bd-col-header">2</th>
              <th id="bdh-2"  class="bd-col-header">3</th>
              <th id="bdh-3"  class="bd-col-header">4</th>
              <th id="bdh-4"  class="bd-col-header">5</th>
              <th id="bdh-5"  class="bd-col-header">6</th>
              <th id="bdh-6"  class="bd-col-header">7</th>
              <th id="bdh-7"  class="bd-col-header">8</th>
              <th id="bdh-8"  class="bd-col-header">9</th>
              <th id="bdh-9"  class="bd-col-header">10</th>
              <th id="bdh-10" class="bd-col-header">11</th>
              <th id="bdh-11" class="bd-col-header">12</th>
              <th id="bdh-12" class="bd-col-header">13</th>
              <th id="bdh-13" class="bd-col-header">14</th>
              <th id="bdh-14" class="bd-col-header">15</th>
              <th id="bdh-15" class="bd-col-header">16</th>
            </tr>
          </thead>
          <tbody id="bd-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="/fw-version.js"></script>
  <script src="/bd.js"></script>
</body>
</html>
