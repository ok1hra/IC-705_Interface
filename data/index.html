<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IC-705 CAT</title>
  <link rel="stylesheet" href="/cat.css">
</head>
<body>
  <header class="topbar">
    <nav class="tabs" aria-label="Primary">
      <a class="tab" href="/log">QRPLog</a>
      <a class="tab" href="/dxc.html" onclick="window.open(this.href,'DXC','width=600,height=750,left=0,top=0,menubar=no,location=no,status=no'); return false;">DXC</a>
      <a class="tab" href="/data" title="Web Client for JS8Call">JS8LAN</a>
      <a class="tab" href="/setup">SETUP</a>
      <a class="tab" href="/datasync">LOGSYNC</a>
      <a class="tab bd-nav" href="/bd" hidden>BD</a>
      <a class="tab tab-active tab-cat-muted" href="/">CAT</a>
      <span id="topbarFw" class="topbar-fw"></span>
    </nav>
  </header>

  <main class="cat-shell">
    <div id="memoryData" hidden>
      <textarea id="cwMem1Data">%CW_MEM1%</textarea>
      <textarea id="cwMem2Data">%CW_MEM2%</textarea>
      <textarea id="cwMem3Data">%CW_MEM3%</textarea>
      <textarea id="cwMem4Data">%CW_MEM4%</textarea>
      <textarea id="freqMem1Data">%FREQ_MEM1%</textarea>
      <textarea id="freqMem2Data">%FREQ_MEM2%</textarea>
      <textarea id="freqMem3Data">%FREQ_MEM3%</textarea>
      <textarea id="freqMem4Data">%FREQ_MEM4%</textarea>
      <textarea id="freqMem5Data">%FREQ_MEM5%</textarea>
      <textarea id="freqMem6Data">%FREQ_MEM6%</textarea>
      <textarea id="freqMem7Data">%FREQ_MEM7%</textarea>
      <textarea id="freqMem8Data">%FREQ_MEM8%</textarea>
      <textarea id="freqMem9Data">%FREQ_MEM9%</textarea>
      <textarea id="freqMem10Data">%FREQ_MEM10%</textarea>
    </div>
    <section class="cat-panel">
      <div class="hero-row">
        <div class="frequency-wrap">
          <p class="label">Frequency</p>
          <div id="frequencyReadout" class="frequency">0.000.00</div>

          <section class="meter-block">
            <div class="meter-legend">
              <span id="meterLabel">S meter</span>
              <span id="meterValue">S0</span>
            </div>
            <div id="meterBar" class="meter-bar" aria-hidden="true"></div>
            <div class="meter-divider" aria-hidden="true"></div>
            <div id="subBar" class="meter-bar meter-bar-secondary" aria-hidden="true"></div>
            <div class="sub-value">
              <span id="subValueLabel">Supply</span>
              <span id="subValueReadout">--.- V</span>
            </div>
          </section>
        </div>

        <div class="side-stack">
          <label class="field-row" for="modeSelect">
            <span>MODE</span>
            <select id="modeSelect">
              <option value="LSB">LSB</option>
              <option value="USB" selected>USB</option>
              <option value="AM">AM</option>
              <option value="CW">CW</option>
              <option value="RTTY">RTTY</option>
              <option value="FM">FM</option>
              <option value="DV">DV</option>
            </select>
          </label>

          <div class="field-row">
            <span>RIT</span>
            <div class="rit-actions">
              <span id="ritReadout" class="secondary-value">0.00 kHz</span>
              <button id="clearRit" class="mini-button" type="button">Clear</button>
            </div>
          </div>

          <label class="field-row" for="freqMemorySelect">
            <span>MEM</span>
            <select id="freqMemorySelect">
              <option value="">Memory select</option>
            </select>
          </label>

          <label class="field-row" for="freqInput">
            <span>FREQ</span>
            <input id="freqInput" type="text" inputmode="numeric" placeholder="Hz">
          </label>
        </div>
      </div>

      <section class="tune-strip">
        <div class="tune-slider-wrap">
          <input id="tuneSlider" type="range" min="-100" max="100" value="0" class="tune-slider" autocomplete="off">
          <span class="tune-center-mark"></span>
        </div>
        <select id="tuneStep" class="tune-step-select">
          <option value="1">1 Hz</option>
          <option value="10">10 Hz</option>
          <option value="100" selected>100 Hz</option>
          <option value="1000">1 kHz</option>
        </select>
      </section>

      <section class="slider-grid">
        <label>
          <span class="slider-head"><span>AF volume</span><span id="afVolumeValue">37</span></span>
          <input id="afVolume" type="range" min="0" max="255" value="37">
        </label>
        <label>
          <span class="slider-head"><span>KEY SPEED</span><span id="keySpeedValue">138</span></span>
          <input id="keySpeed" type="range" min="0" max="255" value="138">
        </label>
        <label>
          <span class="slider-head"><span>RF power</span><span id="rfPowerValue">205</span></span>
          <input id="rfPower" type="range" min="0" max="255" value="205">
        </label>
      </section>

      <section class="button-row">
        <button id="preampButton" type="button">P.AMP/ATT OFF</button>
        <button id="voxButton" type="button">VOX none</button>
        <button id="filterButton" type="button">FIL1</button>
        <button id="pttButton" type="button">PTT</button>
      </section>

      <section class="cw-row">
        <input id="cwInput" type="text" placeholder="Send CW text..." spellcheck="false" autocomplete="off">
        <button id="clearCw" type="button">Clear</button>
      </section>

      <section class="button-row memory-row">
        <button id="cwMemory1" type="button">CW 1</button>
        <button id="cwMemory2" type="button">CW 2</button>
        <button id="cwMemory3" type="button">CW 3</button>
        <button id="cwMemory4" type="button">CW 4</button>
      </section>

      <footer class="status-row">
        <span id="statusAddress">CI-V 0x00</span>
        <span id="statusConnection">Disconnected</span>
        <span id="statusRadio">Radio OFF</span>
        <span id="statusFw">FW ----</span>
      </footer>
    </section>
  </main>

  <script src="/fw-version.js?v=20260718k"></script>
  <script src="/cat.js"></script>
</body>
</html>
