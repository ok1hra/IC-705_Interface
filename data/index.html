<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IC-705 CAT</title>
  <link rel="stylesheet" href="/cat.css">
</head>
<body>
  <header class="topbar">
    <nav class="tabs" aria-label="Primary">
      <a class="tab tab-active" href="/">CAT</a>
      <a class="tab" href="/ws-cat">WS-CAT</a>
      <a class="tab" href="/setup">SETUP</a>
    </nav>
  </header>

  <main class="cat-shell">
    <section class="cat-panel">
      <div class="hero-row">
        <div class="frequency-wrap">
          <p class="label">Frequency</p>
          <div id="frequencyReadout" class="frequency">0.000.00</div>
        </div>

        <div class="side-stack">
          <label class="field-row" for="modeSelect">
            <span>MODE</span>
            <select id="modeSelect">
              <option value="LSB">LSB</option>
              <option value="USB" selected>USB</option>
              <option value="AM">AM</option>
              <option value="CW">CW</option>
              <option value="RTTY">RTTY</option>
              <option value="FM">FM</option>
              <option value="DV">DV</option>
            </select>
          </label>

          <div class="field-row">
            <span>RIT</span>
            <div class="rit-actions">
              <span id="ritReadout" class="secondary-value">0.00 kHz</span>
              <button id="clearRit" class="mini-button" type="button">Clear</button>
            </div>
          </div>
        </div>
      </div>

      <section class="meter-block">
        <div id="meterBar" class="meter-bar" aria-hidden="true"></div>
        <div class="meter-legend">
          <span id="meterLabel">S meter</span>
          <span id="meterValue">S0</span>
        </div>
        <div class="sub-value">
          <span id="subValueLabel">Supply</span>
          <span id="subValueReadout">--.- V</span>
        </div>
      </section>

      <section class="slider-grid">
        <label>
          <span class="slider-head"><span>AF volume</span><span id="afVolumeValue">37</span></span>
          <input id="afVolume" type="range" min="0" max="255" value="37">
        </label>
        <label>
          <span class="slider-head"><span>KEY SPEED</span><span id="keySpeedValue">138</span></span>
          <input id="keySpeed" type="range" min="0" max="255" value="138">
        </label>
        <label>
          <span class="slider-head"><span>RF power</span><span id="rfPowerValue">205</span></span>
          <input id="rfPower" type="range" min="0" max="255" value="205">
        </label>
      </section>

      <section class="button-row">
        <button id="preampButton" type="button">P.AMP/ATT OFF</button>
        <button id="voxButton" type="button">VOX none</button>
        <button id="filterButton" type="button">FIL1</button>
        <button id="pttButton" type="button">PTT</button>
      </section>

      <section class="cw-row">
        <input id="cwInput" type="text" placeholder="Send CW text..." spellcheck="false" autocomplete="off">
        <button id="clearCw" type="button">Clear</button>
      </section>

      <footer class="status-row">
        <span id="statusAddress">CI-V 0x00</span>
        <span id="statusConnection">Disconnected</span>
        <span id="statusRadio">Radio OFF</span>
      </footer>
    </section>
  </main>

  <script src="/cat.js"></script>
</body>
</html>
