function refreshLogDupeSet(){if(logDupeMode==="off"||!window.LogDB){logDupeSet=Object.create(null);return}LogDB.getSetting("activeLogId",null).then(function(logId){if(!logId){logDupeSet=Object.create(null);render();return}return LogDB.getQsosForLog(logId).then(function(qsos){var set=Object.create(null),i,q,call,bandId;for(i=0;i<qsos.length;i++){q=qsos[i];if(!q||q.deleted)continue;call=normalizeCallsign(q.call);if(!call)continue;bandId=bandForFreq(Number(q.frequencyHz)/1000);if(!bandId)continue;set[call+"|"+bandId]=true}logDupeSet=set;render()})}).catch(function(){})}
function scheduleLogDupeRefresh(){if(logDupeMode==="off"||logDupeTimer)return;logDupeTimer=setTimeout(function(){logDupeTimer=0;refreshLogDupeSet()},300)}
if(logDupeSelect){logDupeSelect.value=logDupeMode;logDupeSelect.onchange=function(){var v=this.value;logDupeMode=(v==="off"||v==="gray"||v==="hidden")?v:"gray";try{localStorage.dxcLogDupeMode=logDupeMode}catch(e){}if(logDupeMode==="off"){logDupeSet=Object.create(null);render()}else{refreshLogDupeSet()}}}
refreshLogDupeSet();

connect();
})();
</script></body></html>
